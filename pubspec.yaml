name: mem3
description: "A memory care companion app for dementia patients"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_markdown: ^0.7.4+1
  flutter_svg: ^2.0.9
  fl_chart: ^0.66.0

  # Core
  provider: ^6.1.1
  intl: ^0.19.0
  uuid: ^4.2.2

  # Database
  sqflite_sqlcipher: ^3.4.0
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.1

  # File & Storage
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.1
  file_selector: ^1.0.3
  file_picker: ^8.1.4

  # Media & Accessibility
  record: ^6.1.2
  audioplayers: ^6.0.0
  flutter_tts: ^4.0.2
  speech_to_text: ^7.3.0       # <-- FIXED (Dart 3 safe)

  # Permissions
  permission_handler: ^12.0.1
  location: ^7.0.0

  # Network & Email
  http: ^1.2.0
  mailer: ^6.0.1
  connectivity_plus: ^6.0.3
  share_plus: ^12.0.1
  url_launcher: ^6.3.1

  # AI
  google_generative_ai: ^0.4.5

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

  # Security
  crypto: ^3.0.3
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  image: ^4.0.17
  flutter_launcher_icons: ^0.13.1
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/audio/
    - assets/poi/

# App Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app.png"
  
  # Adaptive icons for Android 8.0+ (much better looking!)
  adaptive_icon_background: "#A78BFA"  # Your app's lavender color
  adaptive_icon_foreground: "assets/app.png"
  
  # Remove extra padding/whitespace
  min_sdk_android: 21
