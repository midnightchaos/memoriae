include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Downgrade warnings to info so CI only fails on actual errors
    unused_import: info
    unused_local_variable: info
    unused_field: info
    unused_element: info
    dead_code: info
    dead_null_aware_expression: info
    unreachable_switch_default: info
    deprecated_member_use: info
    unnecessary_import: info
    depend_on_referenced_packages: info
    avoid_print: info
    use_build_context_synchronously: info
    curly_braces_in_flow_control_structures: info
    prefer_initializing_formals: info
    constant_identifier_names: info

linter:
  rules:
    avoid_print: false
