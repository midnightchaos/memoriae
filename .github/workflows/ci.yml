name: Menta CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Mocks
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate env_config stub for CI
        run: |
          mkdir -p lib/config
          cat > lib/config/env_config.dart << 'EOF'
          class EnvConfig {
            static const String geminiApiKey = '';
            static const bool hasDefaultApiKey = false;
          }
          EOF

      - name: Verify Code Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run Static Analysis
        run: flutter analyze

      - name: Run Tests
        run: flutter test
